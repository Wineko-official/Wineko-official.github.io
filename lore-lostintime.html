<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wineko | Енциклопедія Lost in Time</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url('bg_lore_lostintime.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .interface {
            position: relative;
            width: 100%;
            max-width: 2000px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* ========== П'ЄДЕСТАЛ (ЦЕНТР, ВГОРІ) ========== */
        .pedestal-area {
            position: absolute;
            top: 18%;          /* змісти трохи вище/нижче під фон */
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }
        .pedestal-image {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* ========== ПРАВА ПАНЕЛЬ (МЕНЮ) ========== */
        .menu-area {
            position: absolute;
            top: 25%;
            right: 12%;
            width: 260px;
            height: 400px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid #7a5a4a;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .tabs {
            display: flex;
            gap: 6px;
            border-bottom: 1px solid #7a5a4a;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(30,20,15,0.8);
            border: none;
            padding: 8px 0;
            color: #ddc;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 8px 8px 0 0;
        }
        .tab-btn.active {
            background: #4a3a2a;
            color: #ffd8a0;
            font-weight: bold;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .list-group {
            margin-bottom: 12px;
        }
        .list-letter {
            font-size: 1.1rem;
            font-weight: bold;
            color: #c8aa7a;
            border-bottom: 1px solid #5a4a3a;
            margin-bottom: 5px;
        }
        .list-item {
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.1s;
            font-size: 0.85rem;
        }
        .list-item:hover {
            background: #4a3a2a;
            color: #fff;
        }
        .list-item.selected {
            background: #6a4a2a;
            color: #ffd;
            font-weight: bold;
        }

        /* ========== НИЖНЯ ПАНЕЛЬ ОПИСУ ========== */
        .lore-area {
            position: absolute;
            bottom: 8%;
            left: 15%;
            width: 42%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #6a5a4a;
            border-radius: 20px;
            padding: 18px 24px;
            color: #f0e6d0;
            max-height: 32%;
            overflow-y: auto;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            z-index: 10;
        }
        .lore-area h2 {
            font-size: 1.9rem;
            margin-bottom: 0.2rem;
            color: #ffd8a0;
        }
        .lore-area h3 {
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 1rem;
            color: #c8aa7a;
        }
        .lore-area p {
            font-size: 0.95rem;
            line-height: 1.45;
            text-align: justify;
        }

        /* Кнопка назад */
        .back-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #b89a7a;
            color: #ffd8a0;
            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            z-index: 100;
        }
        .back-link:hover {
            background: #4a3a2a;
            border-color: #ffd8a0;
        }

        /* ========== АДАПТАЦІЯ ДЛЯ МОБІЛЬНИХ ========== */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }
            .pedestal-area {
                position: static;
                margin: 20px auto 0;
                width: 240px;
                height: 240px;
                transform: none;
            }
            .menu-area {
                position: static;
                width: 90%;
                margin: 20px auto;
                height: 320px;
            }
            .lore-area {
                position: static;
                width: 90%;
                margin: 20px auto;
                max-height: none;
            }
            .interface {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-bottom: 30px;
            }
            .back-link {
                position: static;
                display: inline-block;
                margin: 20px auto;
                width: fit-content;
            }
        }
    </style>
</head>
<body>
<div class="interface">
    <div class="pedestal-area">
        <img id="pedestalImg" class="pedestal-image" src="" alt="Entity" style="display: none;">
    </div>

    <div class="menu-area">
        <div class="tabs">
            <button class="tab-btn" data-category="characters">Персонажі</button>
            <button class="tab-btn" data-category="creatures">Істоти</button>
        </div>
        <div id="entityList" class="list-container">
            <div class="list-group">Завантаження...</div>
        </div>
    </div>

    <div class="lore-area" id="lorePanel">
        <h2 id="entityName">-</h2>
        <h3 id="entityTitle"></h3>
        <p id="entityDesc">Оберіть персонажа чи істоту зі списку.</p>
    </div>

    <a href="lore.html" class="back-link">← Повернутися до світів</a>
</div>

<script>
    const BASE_PATH = 'bestiary/';
    const categories = {
        characters: { manifestUrl: BASE_PATH + 'characters.json', folder: 'characters' },
        creatures:  { manifestUrl: BASE_PATH + 'creatures.json',  folder: 'creatures' }
    };

    let currentCategory = 'characters';
    let currentSlugs = [];
    let currentSelectedSlug = null;

    const pedestalImg = document.getElementById('pedestalImg');
    const entityListDiv = document.getElementById('entityList');
    const entityNameSpan = document.getElementById('entityName');
    const entityTitleSpan = document.getElementById('entityTitle');
    const entityDescP = document.getElementById('entityDesc');

    async function fetchManifest(category) {
        const url = categories[category].manifestUrl;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (err) {
            console.error(`Помилка завантаження ${category}:`, err);
            return [];
        }
    }

    async function fetchEntityData(category, slug) {
        const folder = categories[category].folder;
        const url = `${BASE_PATH}${folder}/${slug}/data.json`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (err) {
            console.error(`Помилка завантаження ${slug}:`, err);
            return null;
        }
    }

    function displayEntity(category, slug, data) {
        if (!data) return;
        currentSelectedSlug = slug;
        entityNameSpan.innerText = data.name || 'Без назви';
        entityTitleSpan.innerText = data.title || '';
        entityDescP.innerText = data.description || 'Опис відсутній.';

        const imgPath = `${BASE_PATH}${categories[category].folder}/${slug}/image.png`;
        pedestalImg.src = imgPath;
        pedestalImg.style.display = 'block';
        pedestalImg.onerror = () => {
            pedestalImg.style.display = 'none';
            console.warn(`Зображення не знайдено: ${imgPath}`);
        };
    }

    function buildList(slugs, category) {
        if (!slugs.length) {
            entityListDiv.innerHTML = '<div class="list-group">Немає даних</div>';
            return;
        }
        const groups = {};
        slugs.forEach(slug => {
            let letter = slug.charAt(0).toUpperCase();
            if (!/^[A-Z]$/.test(letter)) letter = '#';
            if (!groups[letter]) groups[letter] = [];
            groups[letter].push(slug);
        });
        const sortedLetters = Object.keys(groups).sort();
        let html = '';
        for (let letter of sortedLetters) {
            html += `<div class="list-group"><div class="list-letter">${letter}</div>`;
            groups[letter].forEach(slug => {
                html += `<div class="list-item" data-slug="${slug}">${slug}</div>`;
            });
            html += `</div>`;
        }
        entityListDiv.innerHTML = html;
        document.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', async (e) => {
                const slug = item.dataset.slug;
                document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                const data = await fetchEntityData(category, slug);
                if (data) displayEntity(category, slug, data);
            });
        });
        const firstItem = document.querySelector('.list-item');
        if (firstItem) firstItem.click();
    }

    async function loadCategory(category) {
        currentCategory = category;
        entityListDiv.innerHTML = '<div class="list-group">Завантаження...</div>';
        const slugs = await fetchManifest(category);
        currentSlugs = slugs;
        if (slugs.length === 0) {
            entityListDiv.innerHTML = '<div class="list-group">Немає сутностей</div>';
            pedestalImg.style.display = 'none';
            entityNameSpan.innerText = '-';
            entityTitleSpan.innerText = '';
            entityDescP.innerText = 'Немає даних для цієї категорії.';
            return;
        }
        buildList(slugs, category);
    }

    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.dataset.category;
                if (cat === currentCategory) return;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCategory(cat);
            });
        });
        document.querySelector('.tab-btn[data-category="characters"]').classList.add('active');
    }

    initTabs();
    loadCategory('characters');
</script>
</body>
</html>
