<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wineko | Енциклопедія Lost in Time</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Контейнер, який масштабується разом із фоном */
        .interface {
            position: relative;
            width: 100%;
            /* Пропорція фонової картинки (заміни на реальну, якщо знаєш) */
            aspect-ratio: 1920 / 1080; /* приклад, підстав своє співвідношення */
            background-image: url('bg_lore_lostintime.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            margin: 0 auto;
        }

        /* Для старих браузерів, які не підтримують aspect-ratio, задамо висоту через padding-bottom */
        @supports not (aspect-ratio: 1/1) {
            .interface {
                height: 0;
                padding-bottom: 56.25%; /* 16:9 = 56.25%, заміни на свою пропорцію */
                background-size: contain;
            }
        }

        /* ========== ПОСТАМЕНТ ДЛЯ ЗОБРАЖЕННЯ ========== */
     .pedestal-area {
    position: absolute;
    left: 41%;
    top: -0.1%;          /* підняв трохи вище, щоб збільшити висоту */
    width: 20%;       /* трохи ширше */
    height: 32%;      /* вище, щоб вмістити більше зображення */
    display: flex;
    justify-content: center;
    align-items: flex-end;  /* притискає до низу */
    pointer-events: none;
    z-index: 5;
}

.pedestal-image {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
    object-position: bottom center;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
}

        /* ========== ПАНЕЛЬ ВИБОРУ (ПРАВА АРКА) ========== */
        .menu-area {
            position: absolute;
            left: 74.8%;
            top: 33.9%;
            width: 20%;
            height: 11%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            border: 1px solid #7a5a4a;
            padding: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(30,20,15,0.8);
            border: none;
            padding: 4px 0;
            color: #ddc;
            font-family: 'Georgia', serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 6px 6px 0 0;
        }
        .tab-btn.active {
            background: #4a3a2a;
            color: #ffd8a0;
            font-weight: bold;
        }
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            font-size: 0.7rem;
        }
        .list-group {
            margin-bottom: 6px;
        }
        .list-letter {
            font-size: 0.75rem;
            font-weight: bold;
            color: #c8aa7a;
            border-bottom: 1px solid #5a4a3a;
            margin-bottom: 2px;
        }
        .list-item {
            padding: 2px 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.1s;
        }
        .list-item:hover {
            background: #4a3a2a;
            color: #fff;
        }
        .list-item.selected {
            background: #6a4a2a;
            color: #ffd;
            font-weight: bold;
        }

        /* ========== ТЕКСТОВА ПАНЕЛЬ (ОСНОВНИЙ БЛОК) ========== */
        .lore-area {
            position: absolute;
            left: 29%;
            top: 55%;
            width: 41.5%;
            height: 28%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            border: 1px solid #6a5a4a;
            border-radius: 16px;
            padding: 12px 20px;
            color: #f0e6d0;
            overflow-y: auto;
            z-index: 10;
        }
        .lore-area h2 {
            font-size: 1.6rem;
            margin-bottom: 0.2rem;
            color: #ffd8a0;
        }
        .lore-area h3 {
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 0.8rem;
            color: #c8aa7a;
        }
       .lore-area p {
    white-space: pre-wrap;    /* зберігає переноси рядків */
    font-size: 0.85rem;
    line-height: 1.5;
}
    .lore-area p strong {
    color: #ffd8a0;           /* золотавий колір для заголовків */
}
.lore-area p em {
    color: #c8aa7a;
}

        /* Кнопка назад */
        .back-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #b89a7a;
            color: #ffd8a0;
            padding: 6px 14px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            z-index: 100;
        }
        .back-link:hover {
            background: #4a3a2a;
            border-color: #ffd8a0;
        }

    /* ========== МОБІЛЬНА ВЕРСІЯ ========== */
@media (max-width: 768px) {
    .interface {
        aspect-ratio: auto;
        height: auto;
        background-size: cover;
        background-attachment: scroll;
    }
    .pedestal-area,
    .menu-area,
    .lore-area {
        position: static;
        width: 90%;
        margin: 15px auto;
        height: auto;
    }
    .pedestal-area {
        width: 260px;
        height: 280px;
        margin-top: 30px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        overflow: visible;
    }
    .pedestal-image {
        width: auto;
        height: auto;
        max-width: 110%;
        max-height: 110%;
        object-fit: contain;
        object-position: center bottom;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
        /* Одночасно зсуваємо вниз (5%) і вліво (-10px). Для зсуву вправо зміни -10px на +10px */
        transform: translateX(16px) translateY(5%);
    }
    .menu-area {
        height: 280px;
    }
    .lore-area {
        max-height: none;
    }
    .back-link {
        position: static;
        display: inline-block;
        margin: 20px auto;
        width: fit-content;
    }
}
    /* Стилізація радіо-плеєра */
.audio-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 4px;
    font-family: "Georgia", serif;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
}

.audio-player button {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid #444;
    color: #fff;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-family: "Georgia", serif;
    transition: all 0.2s ease;
}

.audio-player button:hover {
    border-color: #00d2ff;
    text-shadow: 0 0 8px #00d2ff;
    background: rgba(0, 210, 255, 0.05);
}

#trackName {
    font-size: 12px;
    color: #888;
    max-width: 150px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.volume-container {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
}

#volumeSlider {
    width: 70px;
    accent-color: #00d2ff;
    cursor: pointer;
    background: #333;
    height: 4px;
    border-radius: 2px;
}

/* Адаптація для мобільних */
@media (max-width: 768px) {
    .audio-player {
        bottom: 20px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 30px);
        justify-content: space-between;
        background: rgba(15, 15, 15, 0.95);
        flex-wrap: wrap;
        gap: 10px;
    }
    #trackName {
        max-width: 120px;
    }
}
    </style>
</head>
<body>
<div class="interface">
    <div class="pedestal-area">
        <img id="pedestalImg" class="pedestal-image" src="" alt="Entity" style="display: none;">
    </div>

    <div class="menu-area">
        <div class="tabs">
            <button class="tab-btn" data-category="characters">Персонажі</button>
            <button class="tab-btn" data-category="creatures">Істоти</button>
        </div>
        <div id="entityList" class="list-container">
            <div class="list-group">Завантаження...</div>
        </div>
    </div>

    <div class="lore-area" id="lorePanel">
        <h2 id="entityName">-</h2>
        <h3 id="entityTitle"></h3>
        <p id="entityDesc">Оберіть персонажа чи істоту зі списку.</p>
    </div>

    <a href="lore.html" class="back-link">← Повернутися до світів</a>
</div>

<script>
        const BASE_PATH = 'bestiary/';
    const categories = {
        characters: { manifestUrl: BASE_PATH + 'characters.json', folder: 'characters' },
        creatures:  { manifestUrl: BASE_PATH + 'creatures.json',  folder: 'creatures' }
    };

    let currentCategory = 'characters';
    let currentItems = [];      // масив об'єктів {slug, name}
    let currentSelectedSlug = null;

    const pedestalImg = document.getElementById('pedestalImg');
    const entityListDiv = document.getElementById('entityList');
    const entityNameSpan = document.getElementById('entityName');
    const entityTitleSpan = document.getElementById('entityTitle');
    const entityDescP = document.getElementById('entityDesc');

    async function fetchManifest(category) {
        const url = categories[category].manifestUrl;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (err) {
            console.error(`Помилка завантаження ${category}:`, err);
            return [];
        }
    }

    async function fetchEntityData(category, slug) {
        const folder = categories[category].folder;
        const url = `${BASE_PATH}${folder}/${slug}/data.json`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (err) {
            console.error(`Помилка завантаження ${slug}:`, err);
            return null;
        }
    }

    function displayEntity(category, slug, data) {
        if (!data) return;
        currentSelectedSlug = slug;
        entityNameSpan.innerText = data.name || 'Без назви';
        entityTitleSpan.innerText = data.title || '';
        entityDescP.innerText = data.description || 'Опис відсутній.';

        const imgPath = `${BASE_PATH}${categories[category].folder}/${slug}/image.png`;
        pedestalImg.src = imgPath;
        pedestalImg.style.display = 'block';
        pedestalImg.onerror = () => {
            pedestalImg.style.display = 'none';
            console.warn(`Зображення не знайдено: ${imgPath}`);
        };
    }

    // Побудова списку з группуванням за першою літерою УКРАЇНСЬКОГО імені
    function buildList(items, category) {
        if (!items.length) {
            entityListDiv.innerHTML = '<div class="list-group">Немає даних</div>';
            return;
        }
        const groups = {};
        items.forEach(item => {
            const name = item.name;
            const firstChar = name.charAt(0).toUpperCase();
            // Підтримка українських літер (кирилиця)
            let letter = firstChar;
            if (!groups[letter]) groups[letter] = [];
            groups[letter].push({ slug: item.slug, name: name });
        });
        // Сортування літер: спочатку кирилиця в алфавітному порядку, потім латиниця
        const sortedLetters = Object.keys(groups).sort((a, b) => {
            const isCyrillicA = /^[А-ЯҐЄІЇ]/.test(a);
            const isCyrillicB = /^[А-ЯҐЄІЇ]/.test(b);
            if (isCyrillicA && !isCyrillicB) return -1;
            if (!isCyrillicA && isCyrillicB) return 1;
            return a.localeCompare(b, 'uk');
        });
        let html = '';
        for (let letter of sortedLetters) {
            html += `<div class="list-group"><div class="list-letter">${letter}</div>`;
            // Сортуємо імена всередині групи
            groups[letter].sort((x, y) => x.name.localeCompare(y.name, 'uk'));
            groups[letter].forEach(item => {
                html += `<div class="list-item" data-slug="${item.slug}">${item.name}</div>`;
            });
            html += `</div>`;
        }
        entityListDiv.innerHTML = html;
        document.querySelectorAll('.list-item').forEach(item => {
            item.addEventListener('click', async (e) => {
                const slug = item.dataset.slug;
                document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                const data = await fetchEntityData(category, slug);
                if (data) displayEntity(category, slug, data);
            });
        });
        const firstItem = document.querySelector('.list-item');
        if (firstItem) firstItem.click();
    }

    async function loadCategory(category) {
        currentCategory = category;
        entityListDiv.innerHTML = '<div class="list-group">Завантаження...</div>';
        const items = await fetchManifest(category);
        currentItems = items;
        if (items.length === 0) {
            entityListDiv.innerHTML = '<div class="list-group">Немає сутностей</div>';
            pedestalImg.style.display = 'none';
            entityNameSpan.innerText = '-';
            entityTitleSpan.innerText = '';
            entityDescP.innerText = 'Немає даних для цієї категорії.';
            return;
        }
        buildList(items, category);
    }

    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.dataset.category;
                if (cat === currentCategory) return;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCategory(cat);
            });
        });
        document.querySelector('.tab-btn[data-category="characters"]').classList.add('active');
    }

    initTabs();
    loadCategory('characters');

    
</script>
     <!-- АУДІОПЛЕЄР – НІКОЛИ НЕ ГРАЄ АВТОМАТИЧНО -->
<div class="audio-player">
    <button id="musicBtn" onclick="toggleMusic()">🎵 Увімкнути радіо</button>
    <span id="trackName">📻 Радіо Етернхольт</span>
    <div class="volume-container">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="30" oninput="changeVolume(this.value)">
        <span>🔊</span>
    </div>
</div>
<div id="youtubePlayer" style="display: none;"></div>

<script>
    const videoIDs = ["3y_6zqa5jn8","moKNkLdjKws","T5GdIQHGhv0","K_pY6pdh_2M","fL1327aZdfc","vrZLMxPcHYM","d2FW1DcMdiw","liIizxQ6z4A","Ml9rMQdqDQU","FZCCWVIcFYo","_9vRwdG7IvU","ezYuc1jnP9I"];
    const trackNames = ["Wi-Range - Lyric Story","Wi-Range - Intro","Wi-Range - Skeleton Knight","Wi-Range - Future","Wi-Range - Miami beach","Wi-Range - Night Ranger","Wi-Range & DENIS-G - Night City of Miami","Wi-Range & DENIS-G - NIGHT ROAD (ORIGINAL MIX)","Wi_Range feat Denis-g - back to 80's","Wi_Range - Revenge","Wi_range - Iron age","Wi-Range - Lost In Time"];

    let player = null;
    let isPlaying = false;
    let currentTrack = -1;
    let currentTime = 0;
    let isPlayerReady = false;

    // Функції збереження/відновлення стану (тільки трек і позиція, БЕЗ автоплею)
    function saveState() {
        if (currentTrack !== -1 && isPlayerReady) {
            localStorage.setItem('radio_track', currentTrack);
            localStorage.setItem('radio_time', currentTime);
            // Не зберігаємо стан isPlaying, щоб не грало автоматично
        }
    }

    function loadSavedState() {
        const savedTrack = localStorage.getItem('radio_track');
        const savedTime = parseFloat(localStorage.getItem('radio_time'));
        if (savedTrack !== null && savedTrack >= 0 && isPlayerReady) {
            currentTrack = parseInt(savedTrack);
            currentTime = isNaN(savedTime) ? 0 : savedTime;
            // НЕ відновлюємо isPlaying — залишаємо false
            isPlaying = false;
            document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
            // Завантажуємо трек на 0 секунді, потім перемотуємо
            player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
            let interval = setInterval(() => {
                const dur = player.getDuration();
                if (dur && dur > 0 && currentTime < dur) {
                    clearInterval(interval);
                    player.seekTo(currentTime, true);
                    // Не запускаємо відтворення, тільки встановлюємо позицію
                    player.pauseVideo();
                }
            }, 100);
        } else {
            currentTrack = -1;
        }
    }

    function onPlayerReady() {
        isPlayerReady = true;
        loadSavedState(); // Завантажуємо збережений стан, але не граємо
        // Оновлюємо час кожні 2 секунди
        setInterval(() => {
            if (player && player.getCurrentTime && isPlayerReady && currentTrack !== -1) {
                const t = player.getCurrentTime();
                if (t && !isNaN(t)) {
                    currentTime = t;
                    saveState();
                }
            }
        }, 2000);
    }

    function onPlayerStateChange(event) {
        const btn = document.getElementById("musicBtn");
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            if (btn) { btn.innerText = "⏸ Пауза"; btn.style.borderColor = "#ff6400"; }
            saveState();
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            if (btn) { btn.innerText = "🎵 Увімкнути радіо"; btn.style.borderColor = "#444"; }
            saveState();
        } else if (event.data === YT.PlayerState.ENDED && currentTrack !== -1) {
            // Трек закінчився – наступний випадковий з початку
            let newTrack = currentTrack;
            while (newTrack === currentTrack && videoIDs.length > 1) {
                newTrack = Math.floor(Math.random() * videoIDs.length);
            }
            currentTrack = newTrack;
            currentTime = 0;
            document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
            player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
            if (isPlaying) player.playVideo(); // якщо радіо грало, продовжуємо
            saveState();
        }
    }

    function toggleMusic() {
        if (!player || !isPlayerReady) {
            console.warn("Player not ready");
            return;
        }
        if (!isPlaying) {
            if (currentTrack === -1) {
                // Перший запуск – випадковий трек з випадкової позиції
                currentTrack = Math.floor(Math.random() * videoIDs.length);
                currentTime = 0;
                document.getElementById("trackName").innerText = "📻 " + trackNames[currentTrack];
                player.loadVideoById({ videoId: videoIDs[currentTrack], startSeconds: 0 });
                let interval = setInterval(() => {
                    const dur = player.getDuration();
                    if (dur && dur > 0) {
                        clearInterval(interval);
                        const randomSeek = Math.random() * (dur * 0.7);
                        player.seekTo(randomSeek, true);
                        player.playVideo();
                    }
                }, 100);
                isPlaying = true;
            } else {
                // Продовжити поточний трек
                player.playVideo();
            }
        } else {
            player.pauseVideo();
        }
    }

    function changeVolume(val) {
        if (player && player.setVolume) player.setVolume(val);
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtubePlayer', {
            height: '0', width: '0',
            videoId: videoIDs[0],
            playerVars: { autoplay: 0, controls: 0, disablekb: 1, modestbranding: 1 },
            events: {
                onReady: onPlayerReady,
                onStateChange: onPlayerStateChange
            }
        });
    }

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
</script>
</body>
</html>
