<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Підтримка проєкту | Wineko</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #000;
        color: #fff;
        font-family: "Georgia", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
        overflow-x: hidden;
      }

      /* 🎯 Головний контейнер сайту — тепер величезний, як на головній сторінці */
      .site-container {
        position: relative;
        width: 100%;
        max-width: 2000px;
        display: block;
        --font-scale: 1vw;
      }

      /* Твій інтерфейсний арт на фоні */
      .bg-image {
        width: 100%;
        height: auto;
        display: block;
        pointer-events: none;
      }

      /* Базовий стиль для рамки */
      .window-container {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #ccc;
      }

      /* Головний заголовок ПІДТРИМКА */
      .window-container h2 {
        color: #fff;
        font-size: calc(var(--font-scale) * 1.25);
        font-weight: normal;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-align: center;
      }

      /* Зона прокрутки вмісту */
      .scroll-content {
        width: 100%;
        flex: 1;
        overflow-y: auto;
        padding: 2px 6px;
      }

      /* 🎯 Рідні координати фонової рамки з головної сторінки */
      .center-pillar {
        top: 22%;
        left: 39.3%; /* Стає тютелька в тютельку на великому фоні */
        width: 21.8%;
        height: 67%;
      }

      /* Стилі для списка донатів */
      .donate-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
      }

      .donate-item {
        display: block;
        width: 100%;
        padding: 10px;
        text-align: center;
        color: #fff;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #333;
        text-decoration: none;
        border-radius: 4px;
        font-size: calc(var(--font-scale) * 0.8);
        transition: all 0.2s ease;
        font-family: "Georgia", serif;
      }

      .donate-item:hover {
        background: rgba(255, 100, 0, 0.1);
        border-color: #ff6400;
        text-shadow: 0 0 8px #ff6400;
        transform: scale(1.02);
      }

      /* Навігаційне меню */
      .nav-menu {
        position: absolute;
        top: 33%;
        left: 18.8%;
        width: 15%;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 14px;
        z-index: 10;
      }

      .nav-menu a {
        color: #fff;
        text-decoration: none;
        font-size: calc(var(--font-scale) * 0.85);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: "Georgia", serif;
        white-space: nowrap;
        text-align: right;
        line-height: 1.4;
        transition: all 0.3s ease;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      .nav-menu a:hover {
        color: #00d2ff;
        text-shadow: 0 0 12px #00d2ff;
        transform: translateX(-5px);
      }
    </style>
  </head>
  <body>
    <div class="site-container">
      <img src="bg.png" class="bg-image" alt="Eternhold Interface" />

      <nav class="nav-menu">
        <a href="index.html">Головна</a>
        <a href="lore.html">Світ та Лор</a>
        <a href="books.html">Книги та <br />Проекти</a>
      </nav>

      <div class="window-container center-pillar">
        <h2>ПІДТРИМКА</h2>
        <div class="scroll-content">
          <p
            style="
              text-align: center;
              margin-bottom: 15px;
              font-size: calc(var(--font-scale) * 0.75);
              line-height: 1.4;
            "
          >
            Ваша допомога дозволяє проєкту "Lost in Time" розвиватися швидше.
            Виберіть зручний спосіб:
          </p>

          <div class="donate-list">
            <a
              href="https://send.monobank.ua/jar/szLpaLr6C"
              target="_blank"
              class="donate-item"
              >Monobank Банка</a
            >

            <button
              onclick="copyCryptoAddress(this)"
              class="donate-item"
              style="cursor: pointer"
            >
              Crypto (USDT TRC20)
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      function copyCryptoAddress(buttonElement) {
        const walletAddress = "TAG7c6UXuqzw5NnqQ39mcSoTYMjEe6os8J";

        navigator.clipboard
          .writeText(walletAddress)
          .then(() => {
            const originalText = buttonElement.innerText;

            buttonElement.innerText = "📋 Скопійовано!";
            buttonElement.style.borderColor = "#00d2ff";
            buttonElement.style.textShadow = "0 0 8px #00d2ff";
            buttonElement.style.color = "#00d2ff";

            setTimeout(() => {
              buttonElement.innerText = originalText;
              buttonElement.style.borderColor = "#333";
              buttonElement.style.textShadow = "none";
              buttonElement.style.color = "#fff";
            }, 2500);
          })
          .catch((err) => {
            alert("Адреса гаманця: " + walletAddress);
          });
      }
    </script>
  </body>
</html>
